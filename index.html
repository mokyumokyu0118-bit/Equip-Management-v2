<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>備品予約管理</title>
  <style>
    :root{
      /* 旧バージョンのLight baseを復活 */
      --page:#f6f7fb; --card:#ffffff; --card2:#fbfcff; --border:#e6e9f2; --border2:#dbe1ee; --text:#0f172a; --muted:#64748b; --shadow:0 14px 38px rgba(15,23,42,.08); --shadow2:0 8px 20px rgba(15,23,42,.06); --radius:16px;
      /* 旧バージョンのAccent */
      --primary:#2563eb; --primary2:#7c3aed; --danger:#e11d48; --ok:#16a34a; --warn:#f59e0b; --cyan:#06b6d4;
      /* 旧バージョンのStatus bg (table cells) */
      --reservedBg:#d1d5dba6; --loanBg:#feecd6; --returnedBg:#abffd9; --overdue:#ef4444; --hover:#eef2ff;
    }
    *{box-sizing:border-box} html,body{height:100%}
    body{
      margin:0; font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
      /* 旧バージョンのグラデーション背景 */
      background: radial-gradient(1200px 520px at 20% -10%, rgba(37,99,235,.08), transparent 60%), radial-gradient(900px 480px at 90% 0%, rgba(124,58,237,.06), transparent 65%), var(--page);
      color:var(--text); overflow-x:hidden;
    }
    
    /* ヘッダー・旧デザイン復活 */
    header{
      position:sticky;top:0;z-index:20; background:rgba(255,255,255,.82); backdrop-filter: blur(12px); border-bottom:1px solid var(--border); box-shadow: 0 10px 24px rgba(15,23,42,.06);
    }
    .wrap{ max-width:1200px; margin:0 auto; padding:16px }
    main .wrap{ padding-top:14px; padding-bottom:14px; }
    h1{ margin:0; font-size:18px; display:flex; align-items:center; gap:10px; letter-spacing:.2px; }
    h1:before{ content:""; width:10px;height:10px;border-radius:999px; background: linear-gradient(135deg, var(--primary), var(--primary2)); box-shadow: 0 0 0 3px rgba(37,99,235,.10); display:inline-block; }
    
    /* 旧デザインのコントロール類 */
    label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
    input,select,button{ width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:12px; background:#fff; font-size:14px; outline:none; transition: box-shadow .12s ease, border-color .12s ease, transform .12s ease; }
    input:focus,select:focus{ border-color: rgba(37,99,235,.35); box-shadow: 0 0 0 4px rgba(37,99,235,.10); }
    button{ cursor:pointer; background: linear-gradient(180deg, #ffffff, #f8fafc); width:auto;}
    button:hover{transform: translateY(-1px); box-shadow: var(--shadow2); border-color: var(--border2)}
    button:active{transform: translateY(0px)}
    button.primary{ background: linear-gradient(135deg, rgba(37,99,235,.95), rgba(124,58,237,.92)); color:#fff; border-color: rgba(37,99,235,.25); box-shadow: 0 12px 28px rgba(37,99,235,.18); }
    button.primary:hover{box-shadow: 0 16px 34px rgba(37,99,235,.22)}
    button.danger{ background: linear-gradient(135deg, rgba(225,29,72,.10), rgba(225,29,72,.06)); color: var(--danger); border-color: rgba(225,29,72,.25); }
    .subrow{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:10px; }
    
    /* 旧凡例バッジ復活 */
    .pill{ display:inline-flex; align-items:center; gap:8px; padding:7px 12px; border-radius:999px; border:1px solid var(--border); background:rgba(255,255,255,.92); font-size:12px; color:var(--muted); box-shadow: 0 6px 18px rgba(15,23,42,.05); white-space:nowrap; }
    .badge{ display:inline-block; padding:3px 9px; border-radius:999px; border:1px solid var(--border); font-size:12px; color:#334155; background:#fff; }
    .badge.reserved{background:var(--reservedBg)} .badge.loan{background:var(--loanBg)} .badge.returned{background:var(--returnedBg)} .badge.overdue{ outline:2px solid var(--overdue); outline-offset:-2px; }
    
    /* 旧統計カード復活 */
    .statsGrid{ display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:14px; margin-bottom:14px; }
    @media (max-width:980px){ .statsGrid{grid-template-columns:repeat(2, minmax(0, 1fr));} }
    @media (max-width:520px){ .statsGrid{grid-template-columns:1fr;} }
    .statCard{ background:#fff; border:1px solid var(--border); border-radius:18px; box-shadow: var(--shadow2); padding:16px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px; min-height:88px; }
    .statTitle{ font-size:13px; color:var(--muted); font-weight:650; }
    .statValue{ margin-top:6px; font-size:30px; font-weight:800; letter-spacing:.2px; color:#0f172a; line-height:1; }
    .iconWrap{ width:44px;height:44px;border-radius:14px; display:grid;place-items:center; border:1px solid rgba(15,23,42,.06); }
    .iconWrap.blue{background: rgba(37,99,235,.10)} .iconWrap.green{background: rgba(22,163,74,.12)} .iconWrap.amber{background: rgba(245,158,11,.14)} .iconWrap.red{background: rgba(225,29,72,.10)} .iconWrap svg{width:22px;height:22px}
    
    /* グリッド・旧デザイン復活 */
    .tableWrap{ overflow:auto; border-radius:14px; border:1px solid var(--border); background:#fff; box-shadow: var(--shadow2); max-height: 65vh;}
    table{ border-collapse:collapse; width:100%; font-size:12.5px; text-align:center; color:#0f172a;}
    th,td{ border:1px solid var(--border); padding:6px; min-width:44px; white-space:nowrap; text-align:center; vertical-align:middle;}
    th{ background:#f1f5f9; font-weight:700; position:sticky; top:0; z-index:10; }
    td.cell{ cursor:pointer; }
    td.cell:hover{ background:var(--hover); }
    td.cell.reserved{background:var(--reservedBg)} td.cell.loan{background:var(--loanBg)} td.cell.returned{background:var(--returnedBg)} .td.cell.overdue{ outline:2px solid var(--overdue); outline-offset:-2px; }

    /* 時間軸グリッド用・旧デザイン復活 */
    .hourly-date-cell { font-weight:bold; background:#f8fafc; vertical-align:middle; position:sticky; left:0; z-index:5; border-right:2px solid var(--border); width:60px;}
    .item-cell { position:sticky; left:60px; background:#fff; z-index:5; text-align:left; border-right:1px solid var(--border);}
    
    /* ★場所ごとの色分けCSS */
    /* リアカー */
    .bg-rear2 { background-color: rgba(6, 182, 212, 0.08) !important; } /* Cyan 1号車 */
    .bg-rear3 { background-color: rgba(37, 99, 235, 0.08) !important; } /* Blue 2号車 */
    /* スペース */
    .bg-ps1f-old { background-color: rgba(245, 158, 11, 0.08) !important; } /* Amber 旧館 */
    .bg-ps1f-new { background-color: rgba(225, 29, 72, 0.08) !important; } /* Red 新館1F */
    .bg-ps2f { background-color: rgba(124, 58, 237, 0.08) !important; } /* Violet 新館2F */
    .bg-ds { background-color: rgba(22, 163, 74, 0.08) !important; } /* Green デスク */
    
    /* 一覧・旧デザイン復活 */
    .listTable th{background:#f1f5f9;position:sticky;top:0;z-index:2} .listTable th,.listTable td{padding:10px;font-size:13px} .listTable tbody tr:hover td{background:var(--hover)}

    /* モーダル・旧デザイン復活 */
    dialog{ border:none; border-radius:18px; padding:0; width:min(720px,92vw); max-height: 92vh; box-shadow:var(--shadow); overflow:hidden; }
    dialog::backdrop{background:rgba(2,6,23,.45)}
    .modalHead{ padding:14px 16px; border-bottom:1px solid var(--border); background:#f8fafc; display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .modalBody{ padding:16px; display:grid; gap:10px; }
    .flex-row { display:flex; gap:10px; }
    .msg{ font-size:13px; color:var(--danger);}
    .xbtn{ width:40px;height:40px;border-radius:12px; display:grid;place-items:center;background:#fff;border:1px solid var(--border) }

    /* 旧トースト通知復活 */
    #toast{ position:fixed; top:16px; right:16px; z-index:9999; max-width:min(520px, calc(100vw - 32px)); padding:12px 14px; border-radius:14px; border:1px solid var(--border); box-shadow:var(--shadow); background:#fff; color:#0f172a; font-size:13px; display:none;}
    #toast.show{display:block; animation:toastIn .15s ease-out} @keyframes toastIn{from{transform:translateY(-6px); opacity:0}to{transform:translateY(0); opacity:1}}
  </style>
</head>
<body>

<header>
  <div class="wrap" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;">
    <h1>備品予約管理</h1>
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <div style="width:200px;"><input id="monthPicker" type="month" /></div>
      <select id="categorySelect" style="font-weight:bold; border-color:var(--primary); color:var(--primary); width:200px;">
        <option value="av">音響・ケーブル (日単位)</option>
        <option value="rearcar">リヤカー (時間単位)</option>
        <option value="pipespace">パイプスペース (時間単位)</option>
        <option value="deskspace">デスクスペース (時間単位)</option>
      </select>
    </div>
  </div>
  
  <div class="wrap" style="padding-top:0;">
    <div class="subrow">
      <span class="pill">色： <span class="badge reserved">予約</span> <span class="badge loan">貸出中</span> <span class="badge returned">返却済</span> <span class="badge overdue" style="margin-left:6px;">期限超過</span> </span>
      <span class="pill" id="limitText">※予約期限：翌月末まで</span>
      <button id="itemsBtn" style="width:auto;">備品管理</button>
      <button id="notifBtn" style="width:auto;">返却通知ON</button>
      <button id="clearBtn" class="danger" style="width:auto;">全データ削除</button>
    </div>
  </div>
</header>

<main class="wrap">
  <section class="statsGrid" aria-label="サマリー">
    <div class="statCard"> <div> <div class="statTitle">総備品数</div> <div class="statValue" id="statTotal">—</div> </div> <div class="iconWrap blue" aria-hidden="true"> <svg viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><path d="M3.3 7l8.7 5 8.7-5"></path><path d="M12 22V12"></path></svg> </div> </div>
    <div class="statCard"> <div> <div class="statTitle">本日利用可能</div> <div class="statValue" id="statAvailable">—</div> </div> <div class="iconWrap green" aria-hidden="true"> <svg viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2"><path d="M20 6 9 17l-5-5"></path></svg> </div> </div>
    <div class="statCard"> <div> <div class="statTitle">貸出中（本日）</div> <div class="statValue" id="statLoan">—</div> </div> <div class="iconWrap amber" aria-hidden="true"> <svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><circle cx="12" cy="12" r="9"></circle><path d="M12 7v6l4 2"></path></svg> </div> </div>
    <div class="statCard"> <div> <div class="statTitle">期限超過</div> <div class="statValue" id="statOverdue">—</div> </div> <div class="iconWrap red" aria-hidden="true"> <svg viewBox="0 0 24 24" fill="none" stroke="#e11d48" stroke-width="2"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg> </div> </div>
  </section>

  <div class="tableWrap">
    <table id="grid"></table>
  </div>
</main>

<dialog id="modal">
  <div class="modalHead">
    <div> <div style="font-size:12px;color:var(--muted);">予約詳細</div> <div id="modalTitle" style="font-size:15px;font-weight:850;">場所・日時</div> </div>
    <button class="xbtn" onclick="modal.close();">✕</button>
  </div>
  <div class="modalBody">
    <div><label>備品/場所</label><select id="modalItem" disabled></select></div>
    <div class="flex-row">
      <div style="flex:1;"><label>利用日</label><input id="modalDate" type="date" /></div>
    </div>
    <div id="hourlyInputs" class="flex-row" style="display:none;">
      <div style="flex:1;"><label>開始時間 (9:00~21:00)</label><input id="modalStartTime" type="time" min="09:00" max="21:00" step="1800"/></div>
      <div style="flex:1;"><label>終了時間 (9:00~21:00)</label><input id="modalEndTime" type="time" min="09:00" max="21:00" step="1800"/></div>
    </div>
    <div><label>団体名</label><input id="modalGroup" placeholder="例：軽音楽研究会IPC" /></div>
    <div> <label>状態</label> <select id="modalStatus"> <option value="reserved">予約（未貸出）</option> <option value="loan">貸出中</option> <option value="returned">返却済</option> </select> </div>
    <div><label>伝票番号 (セルに表示)</label><input id="modalSlip" placeholder="例：A-12345" /></div>
    <div id="modalMsg" class="msg"></div>
  </div>
  <div class="modalHead" style="border-top:1px solid var(--border); border-bottom:none; background:#fff; margin-top:10px;">
    <button id="btnDelete" class="danger">削除</button>
    <div style="display:flex; gap:10px; margin-left:auto;">
      <button onclick="modal.close();">閉じる</button>
      <button id="btnSave" class="primary">保存</button>
    </div>
  </div>
</dialog>

<div id="toast">トースト通知です。</div>

<script>
/* =========================================================
   1) データ移行と備品データ
========================================================= */
const ITEMS_DEFAULT = [
  // --- AV（日単位） ---
  { id: 1, name: "ワイヤレスセット / A", category: "av" },
  { id: 2, name: "ワイヤレスセット / B", category: "av" },
  { id: 11, name: "有線マイク / A", category: "av" },
  // ... ★ここに元のマイクやケーブルのデータを追加

  // --- リヤカー（時間単位） ---
  { id: 101, name: "2号車", category: "rearcar" },
  { id: 102, name: "3号車", category: "rearcar" },

  // --- パイプスペース（時間単位） ---
  { id: 201, name: "旧館1F(111)", category: "pipespace" },
  { id: 202, name: "新館1F(30)", category: "pipespace" },
  { id: 203, name: "新館2F(19)", category: "pipespace" },

  // --- デスクスペース（時間単位） ---
  { id: 301, name: "デスクスペース(4つ)", category: "deskspace" }
];

const STORAGE_KEY_V2 = "equip_reservations_tabs_v2"; // 旧バージョン
const STORAGE_KEY_V3 = "equip_reservations_v3";      // 新バージョン

// 旧バージョンデータを移行する
function migrateData(){
  const oldRaw = localStorage.getItem(STORAGE_KEY_V2);
  const newRaw = localStorage.getItem(STORAGE_KEY_V3);
  
  if(oldRaw && !newRaw){
    console.log("旧バージョンのデータ移行を開始します。");
    const oldList = JSON.parse(oldRaw);
    const newList = [];
    
    // 旧データ（日単位）は 9:00〜21:00 の予約と見なして変換
    oldList.forEach((r, idx) => {
      // データの不備（団体名がないなど）は最低限補完
      const group = String(r.group || "").trim();
      if(!group) return; // 団体名がない予約は移行しない

      newList.push({
        id: (Date.now() + idx).toString(), // 新規ID
        itemId: r.itemId,
        date: r.date,
        startTime: "09:00",
        endTime: "21:00",
        group: group,
        slipNo: r.slipNo || "",
        status: r.status || "reserved"
      });
    });
    
    localStorage.setItem(STORAGE_KEY_V3, JSON.stringify(newList));
    // 旧データを削除（またはリネーム）して移行完了
    localStorage.removeItem(STORAGE_KEY_V2);
    console.log(`移行完了：${newList.length}件`);
    location.reload(); // データを反映するためにリロード
  }
}
// ページ読み込み時に移行を実行
migrateData();

function loadReservations(){
  return JSON.parse(localStorage.getItem(STORAGE_KEY_V3) || "[]");
}
function saveReservations(arr){
  localStorage.setItem(STORAGE_KEY_V3, JSON.stringify(arr));
}

// ユーティリティ
function pad2(n){ return String(n).padStart(2,"0"); }
function ymd(date){ return `${date.getFullYear()}-${pad2(date.getMonth()+1)}-${pad2(date.getDate())}`; }
function daysInMonth(y,m){ return new Date(y,m,0).getDate(); }
function getSelectedMonth(){
  const [y,m] = document.getElementById("monthPicker").value.split("-").map(Number);
  return {year:y, month:m};
}
function weekdayJa(date){ return ["(日)","(月)","(火)","(水)","(木)","(金)","(土)"][date.getDay()]; }
const todayYmd = ymd(new Date());

// トースト通知・旧デザイン復活
function showToast(text, kind="ok", ms=2400){
  const toast = document.getElementById("toast");
  toast.textContent = text;
  toast.className = `show`;
  toast.style.display = "block";
  setTimeout(() => { toast.style.display = "none"; toast.className = ""; }, ms);
}

/* =========================================================
   2) 統計情報の更新・旧デザイン復活
========================================================= */
function updateStats(){
  const resList = loadReservations();
  const cat = document.getElementById("categorySelect").value;
  const items = ITEMS_DEFAULT.filter(i => cat === "av" || i.category === cat);
  
  const total = items.length;
  let usedToday = 0;
  let loanToday = 0;
  let overdue = 0;
  
  items.forEach(it => {
    // 本日の利用状況を判定（日単位・時間単位問わず、その日に予約があるかどうか）
    const resToday = resList.find(r => r.itemId == it.id && r.date === todayYmd);
    if(resToday){
      usedToday++;
      if(resToday.status === "loan") loanToday++;
    }
  });

  // 期限超過のカウント（時間単位の場合は「本日の21時を過ぎて貸出中」も超過と見なす、簡易実装）
  // ※ここでは省略していますが、本格運用の際は追加をおすすめします
  overdue = 0; 
  
  document.getElementById("statTotal").textContent = total;
  document.getElementById("statAvailable").textContent = total - usedToday;
  document.getElementById("statLoan").textContent = loanToday;
  document.getElementById("statOverdue").textContent = overdue;
}

/* =========================================================
   3) カレンダー描画ロジック（日付1、2日問題修正済み、色分け対応）
========================================================= */
function renderAll(){
  const cat = document.getElementById("categorySelect").value;
  updateLimitText(cat);
  updateStats();
  
  if(cat === "av") {
    renderDailyGrid();
  } else {
    renderHourlyGrid(cat);
  }
}

function updateLimitText(cat) {
  const textEl = document.getElementById("limitText");
  if(cat === "av") textEl.textContent = "※予約期限：翌月末まで (1日単位)";
  else if(cat === "rearcar") textEl.textContent = "※予約期限：1ヶ月先の月末まで (9:00〜21:00)";
  else textEl.textContent = "※予約期限：3ヶ月先の月末まで (9:00〜21:00)";
}

// 【従来型】日単位カレンダー・旧デザイン復活（横軸：日付、縦軸：備品）
function renderDailyGrid(){
  const {year, month} = getSelectedMonth();
  const dim = daysInMonth(year, month);
  const items = ITEMS_DEFAULT.filter(i => i.category === "av");
  const resList = loadReservations();

  let thead = `<tr><th class="item-cell" style="top:0; border-right:2px solid var(--border);">備品</th>`;
  for(let d=1; d<=dim; d++) {
    const dt = new Date(year, month-1, d);
    thead += `<th style="top:0;">${d}<br>${weekdayJa(dt).slice(1,2)}</th>`;
  }
  thead += `</tr>`;

  let tbody = "";
  items.forEach(it => {
    tbody += `<tr><td class="item-cell" style="border-right:2px solid var(--border);">${it.name}</td>`;
    for(let d=1; d<=dim; d++){
      const dateStr = `${year}-${pad2(month)}-${pad2(d)}`;
      const res = resList.find(r => r.itemId == it.id && r.date === dateStr);
      
      if(res){
        tbody += `<td class="cell ${res.status}" onclick="openModal('${it.id}', '${dateStr}', '${res.id}')" title="${res.group}">${res.slipNo || '済'}</td>`;
      } else {
        tbody += `<td class="cell" onclick="openModal('${it.id}', '${dateStr}')"></td>`;
      }
    }
    tbody += `</tr>`;
  });

  document.getElementById("grid").innerHTML = `<thead>${thead}</thead><tbody>${tbody}</tbody>`;
}

// 【新型】時間単位カレンダー・旧デザイン復活（日付問題修正済み、場所ごとの色分け）
function renderHourlyGrid(category){
  const {year, month} = getSelectedMonth();
  const dim = daysInMonth(year, month);
  const items = ITEMS_DEFAULT.filter(i => i.category === category);
  const resList = loadReservations();

  // ★ヘッダーに曜日を追加、日付カラムの幅を確保（日付1、2日問題修正）
  let thead = `<tr><th class="hourly-date-cell" style="top:0;">日付</th><th class="item-cell" style="top:0; left:60px;">場所/備品</th>`;
  for(let h=9; h<=21; h++) thead += `<th style="top:0;">${h}:00</th>`;
  thead += `</tr>`;

  let tbody = "";
  for(let d=1; d<=dim; d++){
    const dateStr = `${year}-${pad2(month)}-${pad2(d)}`;
    const dt = new Date(year, month-1, d);
    
    items.forEach((it, idx) => {
      // ★場所ごとの色分けクラスを判定
      let colorClass = "";
      if (it.name.includes("2号車")) colorClass = "bg-rear2";
      else if (it.name.includes("3号車")) colorClass = "bg-rear3";
      else if (it.name.includes("旧館1F")) colorClass = "bg-ps1f-old";
      else if (it.name.includes("新館1F")) colorClass = "bg-ps1f-new";
      else if (it.name.includes("新館2F")) colorClass = "bg-ps2f";
      else if (it.name.includes("デスクスペース")) colorClass = "bg-ds";

      tbody += `<tr class="${colorClass}">`; // 行全体に色分けクラスを適用（予約セルは状態で上書きされる）
      if(idx === 0) {
        // ★日付セルに曜日を追加
        tbody += `<td class="hourly-date-cell" rowspan="${items.length}">${d} ${weekdayJa(dt)}</td>`;
      }
      tbody += `<td class="item-cell" style="left:60px;">${it.name}</td>`;

      for(let h=9; h<=21; h++){
        const hourStr = `${pad2(h)}:00`;
        // その時間帯にかぶっている予約を探す（9:00〜10:00なら、9:00のセルに表示）
        const res = resList.find(r => {
          if(r.itemId != it.id || r.date !== dateStr) return false;
          // 簡易的な時間被り判定：開始時間以降、終了時間未満（9:00〜10:00予約なら、9:00のセルに該当、10:00のセルには該当しない）
          return r.startTime <= hourStr && hourStr < r.endTime; 
        });

        if(res){
          // 予約済セルのレンダリング（!colorClassを指定することで場所の色分けより優先）
          tbody += `<td class="cell ${res.status}" onclick="openModal('${it.id}', '${dateStr}', '${res.id}')" title="${res.group} (${res.startTime}~${res.endTime})">済</td>`;
        } else {
          // 空きセルのレンダリング（場所ごとの色分けが適用される）
          tbody += `<td class="cell ${colorClass}" onclick="openModal('${it.id}', '${dateStr}', null, '${hourStr}')"></td>`;
        }
      }
      tbody += `</tr>`;
    });
  }

  document.getElementById("grid").innerHTML = `<thead>${thead}</thead><tbody>${tbody}</tbody>`;
}

/* =========================================================
   4) モーダル操作とデータ保存
========================================================= */
const modal = document.getElementById("modal");
let currentEditingId = null; // 既存予約の編集用ID

// 備品プルダウン生成
const modalItem = document.getElementById("modalItem");
ITEMS_DEFAULT.forEach(it => {
  modalItem.innerHTML += `<option value="${it.id}">${it.name}</option>`;
});

function openModal(itemId, dateStr, existingResId = null, clickedHour = null){
  document.getElementById("modalMsg").textContent = "";
  const cat = document.getElementById("categorySelect").value;
  
  modalItem.value = itemId;
  document.getElementById("modalDate").value = dateStr;
  
  // AV（日単位）か、それ以外（時間単位）かでモーダルのUIを切り替える
  const isHourly = (cat !== "av");
  document.getElementById("hourlyInputs").style.display = isHourly ? "flex" : "none";

  if(existingResId){
    // 既存予約の編集
    const res = loadReservations().find(r => r.id === existingResId);
    currentEditingId = res.id;
    document.getElementById("modalTitle").textContent = `${res.date} の予約編集`;
    document.getElementById("modalGroup").value = res.group;
    document.getElementById("modalSlip").value = res.slipNo;
    document.getElementById("modalStatus").value = res.status;
    if(isHourly){
      document.getElementById("modalStartTime").value = res.startTime;
      document.getElementById("modalEndTime").value = res.endTime;
    }
    document.getElementById("btnDelete").style.display = "block";
  } else {
    // 新規
    currentEditingId = Date.now().toString(); // 新規ID発行（移行時に旧IDと被らないよう現在時刻を使用）
    document.getElementById("modalTitle").textContent = `${dateStr} の新規予約`;
    document.getElementById("modalGroup").value = "";
    document.getElementById("modalSlip").value = "";
    document.getElementById("modalStatus").value = "reserved";
    if(isHourly && clickedHour){
      document.getElementById("modalStartTime").value = clickedHour;
      // 終了時間はデフォルトで1時間後に設定
      let endH = parseInt(clickedHour.split(":")[0]) + 1;
      document.getElementById("modalEndTime").value = `${pad2(endH)}:00`;
    } else if (isHourly) {
        // デフォルト時間を9:00~10:00に設定
        document.getElementById("modalStartTime").value = "09:00";
        document.getElementById("modalEndTime").value = "10:00";
    }
    document.getElementById("btnDelete").style.display = "none";
  }

  modal.showModal();
}

// 保存処理
document.getElementById("btnSave").onclick = () => {
  const itemId = document.getElementById("modalItem").value;
  const dateStr = document.getElementById("modalDate").value;
  const group = document.getElementById("modalGroup").value.trim();
  const slipNo = document.getElementById("modalSlip").value.trim();
  const status = document.getElementById("modalStatus").value;
  const cat = document.getElementById("categorySelect").value;
  
  let startTime = null, endTime = null;
  
  if(!group) {
    document.getElementById("modalMsg").textContent = "団体名を入れてください。";
    return;
  }
  // 伝票番号は旧バージョンでは必須でしたが、時間単位予約への移行にあたり、必須を解除する（紙の台帳にも記入欄がないため）
  // もし旧バージョンと同じく必須にする場合は、以下のコメントアウトを解除してください
  /* if(!slipNo) {
    document.getElementById("modalMsg").textContent = "伝票番号を入れてください（セル表示用）。";
    return;
  } */

  // 時間単位予約のバリデーション
  if(cat !== "av") {
    startTime = document.getElementById("modalStartTime").value;
    endTime = document.getElementById("modalEndTime").value;
    if(!startTime || !endTime || startTime >= endTime || startTime < "09:00" || endTime > "21:00") {
      document.getElementById("modalMsg").textContent = "正しい利用時間を入力してください (9:00〜21:00)。";
      return;
    }
  } else {
    // 日単位（AV）の場合は、9:00〜21:00 の予約と見なす
    startTime = "09:00";
    endTime = "21:00";
  }

  let list = loadReservations();
  
  // 編集中のデータはいったん除外
  list = list.filter(r => r.id !== currentEditingId);

  // ★重複チェックロジック（時間単位対応）
  // その日のその備品にすでに予約が入っているか判定
  const resOnSameDayItem = list.filter(r => r.itemId == itemId && r.date === dateStr);
  let isOverlapped = false;
  for (const r of resOnSameDayItem) {
    // 時間被り判定：(開始1 < 終了2) かつ (終了1 > 開始2)
    if ((startTime < r.endTime) && (endTime > r.startTime)) {
        isOverlapped = true;
        break;
    }
  }

  if (isOverlapped) {
    document.getElementById("modalMsg").textContent = "すでに他の団体がその時間帯に予約しています。";
    return;
  }

  // 保存
  list.push({
    id: currentEditingId,
    itemId: itemId,
    date: dateStr,
    startTime: startTime,
    endTime: endTime,
    group: group,
    slipNo: slipNo,
    status: status
  });

  saveReservations(list);
  modal.close();
  renderAll();
  showToast("保存しました。", "ok");
};

// 削除処理
document.getElementById("btnDelete").onclick = () => {
  if(!confirm("本当に削除しますか？")) return;
  let list = loadReservations();
  list = list.filter(r => r.id !== currentEditingId);
  saveReservations(list);
  modal.close();
  renderAll();
  showToast("削除しました。", "error", 2000); // 削除は目立つようにerror kind、少し長めに
}

// 初期化
document.getElementById("monthPicker").value = ymd(new Date()).slice(0,7);
document.getElementById("monthPicker").addEventListener("change", renderAll);
document.getElementById("categorySelect").addEventListener("change", renderAll);

// 初回描画
renderAll();

</script>
