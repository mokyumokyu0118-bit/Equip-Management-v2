<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>備品予約管理</title>
  <style>
    :root{
      /* Light base */
      --page:#f6f7fb; --card:#ffffff; --card2:#fbfcff; --border:#e6e9f2; --border2:#dbe1ee;
      --text:#0f172a; --muted:#64748b; --shadow:0 14px 38px rgba(15,23,42,.08); --shadow2:0 8px 20px rgba(15,23,42,.06); --radius:16px;
      /* Accent */
      --primary:#2563eb; --primary2:#7c3aed; --danger:#e11d48; --ok:#16a34a; --warn:#f59e0b; --cyan:#06b6d4;
      /* Status bg */
      --reservedBg:#d1d5dba6; --loanBg:#feecd6; --returnedBg:#abffd9; --overdue:#ef4444; --hover:#eef2ff;
    }
    *{box-sizing:border-box} html,body{height:100%}
    body{
      margin:0; font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
      background: radial-gradient(1200px 520px at 20% -10%, rgba(37,99,235,.08), transparent 60%),
                  radial-gradient(900px 480px at 90% 0%, rgba(124,58,237,.06), transparent 65%), var(--page);
      color:var(--text); overflow-x:hidden;
    }
    
    /* Header */
    header{
      position:sticky;top:0;z-index:20; background:rgba(255,255,255,.82); backdrop-filter: blur(12px);
      border-bottom:1px solid var(--border); box-shadow: 0 10px 24px rgba(15,23,42,.06);
    }
    .wrap{max-width:none;margin:0 auto;padding:16px}
    main .wrap{padding-top:14px}
    h1{ margin:0; font-size:18px; display:flex; align-items:center; gap:10px; letter-spacing:.2px; }
    h1:before{ content:""; width:10px;height:10px;border-radius:999px; background: linear-gradient(135deg, var(--primary), var(--primary2)); box-shadow: 0 0 0 3px rgba(37,99,235,.10); display:inline-block; }

    /* Controls */
    label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
    input,select,button{ width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:12px; background:#fff; font-size:14px; outline:none; transition: box-shadow .12s ease, border-color .12s ease, transform .12s ease; }
    input:focus,select:focus{ border-color: rgba(37,99,235,.35); box-shadow: 0 0 0 4px rgba(37,99,235,.10); }
    button{ cursor:pointer; background: linear-gradient(180deg, #ffffff, #f8fafc); width:auto;}
    button:hover{transform: translateY(-1px); box-shadow: var(--shadow2); border-color: var(--border2)}
    button:active{transform: translateY(0px)}
    button.primary{ background: linear-gradient(135deg, rgba(37,99,235,.95), rgba(124,58,237,.92)); color:#fff; border-color: rgba(37,99,235,.25); box-shadow: 0 12px 28px rgba(37,99,235,.18); }
    button.primary:hover{box-shadow: 0 16px 34px rgba(37,99,235,.22)}
    button.danger{ background: linear-gradient(135deg, rgba(225,29,72,.10), rgba(225,29,72,.06)); color: var(--danger); border-color: rgba(225,29,72,.25); }
    
    .subrow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:10px}
    .hint{font-size:12px;color:var(--muted);margin-top:6px}

    /* Pills & Badges */
    .pill{ display:inline-flex; align-items:center; gap:8px; padding:7px 12px; border-radius:999px; border:1px solid var(--border); background:rgba(255,255,255,.92); font-size:12px; color:var(--muted); box-shadow: 0 6px 18px rgba(15,23,42,.05); white-space:nowrap; }
    .badge{ display:inline-block; padding:3px 9px; border-radius:999px; border:1px solid var(--border); font-size:12px; color:#334155; background:#fff; }
    .badge.reserved{background:var(--reservedBg)} .badge.loan{background:var(--loanBg)} .badge.returned{background:var(--returnedBg)} .badge.overdue{ outline:2px solid var(--overdue); outline-offset:-2px; }

    /* Tabs */
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .tabbtn{ width:auto; padding:9px 14px; border-radius:999px; border:1px solid var(--border); background:rgba(255,255,255,.92); font-size:13px; color:#334155; box-shadow: 0 6px 18px rgba(15,23,42,.05); }
    .tabbtn.active{ background: linear-gradient(135deg, rgba(37,99,235,.10), rgba(124,58,237,.08)); border-color: rgba(37,99,235,.22); color:#1e3a8a; }
    .tabpane{display:none} .tabpane.active{display:block}

    /* Stats Grid */
    .statsGrid{ display:grid; grid-template-columns:repeat(4, minmax(0, 1fr)); gap:14px; margin-bottom:14px; }
    @media (max-width:980px){ .statsGrid{grid-template-columns:repeat(2, minmax(0, 1fr));} }
    @media (max-width:520px){ .statsGrid{grid-template-columns:1fr;} }
    .statCard{ background:#fff; border:1px solid var(--border); border-radius:18px; box-shadow: var(--shadow2); padding:16px; display:flex; align-items:center; justify-content:space-between; gap:10px; min-height:88px; }
    .statTitle{ font-size:13px; color:var(--muted); font-weight:650; }
    .statValue{ margin-top:6px; font-size:30px; font-weight:800; color:#0f172a; line-height:1; }
    .iconWrap{ width:44px;height:44px;border-radius:14px; display:grid;place-items:center; border:1px solid rgba(15,23,42,.06); }
    .iconWrap.blue{background: rgba(37,99,235,.10)} .iconWrap.green{background: rgba(22,163,74,.12)} .iconWrap.amber{background: rgba(245,158,11,.14)} .iconWrap.red{background: rgba(225,29,72,.10)} .iconWrap svg{width:22px;height:22px}

    /* Grid Table Base */
    .tableWrap{ overflow:auto; border-radius:14px; border:1px solid var(--border); background:#fff; box-shadow: var(--shadow2); max-height: calc(100vh - 360px); }
    @media (max-width:520px){ .tableWrap{max-height: calc(100vh - 380px);} }
    table{ border-collapse:separate; border-spacing:0; width:max(900px,100%); background:#fff; font-size:12.5px; color:#0f172a; }
    th,td{ border-bottom:1px solid var(--border); border-right:1px solid var(--border); padding:6px 8px; vertical-align:middle; text-align:center; min-width:44px; white-space:nowrap; }
    thead th{ position:sticky; top:0; z-index:10; background:#f1f5f9; font-weight:700; }
    thead tr:nth-child(2) th{ top:30px; font-weight:650; color:#475569; background:#f8fafc; }
    td.cell{cursor:pointer;position:relative}
    td.cell.reserved{background:var(--reservedBg)} td.cell.loan{background:var(--loanBg)} td.cell.returned{background:var(--returnedBg)} td.cell:hover{background:var(--hover) !important} td.cell.overdue{ outline:2px solid var(--overdue); outline-offset:-2px; }

    /* ★端っこ見切れる問題の修正：専用の固定(Sticky)クラスを用意 */
    /* 日単位用（AV） */
    .daily-sticky { position:sticky; left:0; z-index:5; background:#fff; min-width:260px; max-width:260px; border-right:1px solid var(--border2); text-align:left; }
    thead .daily-sticky { z-index:15; background:#f1f5f9; text-align:center; }
    /* 時間単位用（リアカー・スペース等） */
    .hourly-sticky-date { position:sticky; left:0; z-index:5; background:#f8fafc; min-width:80px; max-width:80px; border-right:2px solid var(--border2); font-weight:bold; }
    .hourly-sticky-item { position:sticky; left:80px; z-index:5; background:#fff; min-width:180px; max-width:180px; border-right:1px solid var(--border2); text-align:left; }
    thead .hourly-sticky-date, thead .hourly-sticky-item { z-index:15; background:#f1f5f9; text-align:center; border-bottom: 1px solid var(--border2); }

    /* ★場所ごとの色分け */
    .bg-rear2 { background-color: rgba(6, 182, 212, 0.08) !important; }
    .bg-rear3 { background-color: rgba(37, 99, 235, 0.08) !important; }
    .bg-ps1f-old { background-color: rgba(245, 158, 11, 0.08) !important; }
    .bg-ps1f-new { background-color: rgba(225, 29, 72, 0.08) !important; }
    .bg-ps2f { background-color: rgba(124, 58, 237, 0.08) !important; }
    .bg-ds { background-color: rgba(22, 163, 74, 0.08) !important; }

    /* Top scroll bar */
    .topScroll{ overflow-x:auto; overflow-y:hidden; height:14px; border:1px solid var(--border); border-radius:12px; background:#fff; box-shadow: var(--shadow2); }
    #topScrollInner{height:1px;}

    /* List table */
    .listTable{ width:100%; border:1px solid var(--border); border-radius:14px; overflow:hidden; background:#fff; box-shadow: var(--shadow2); }
    .listTable table{width:100%;min-width:920px;background:#fff}
    .listTable th{background:#f1f5f9;position:sticky;top:0;z-index:2}
    .listTable th,.listTable td{padding:10px;font-size:14px; text-align:center; vertical-align:middle;}
    .statusBtn{ width:auto; padding:8px 12px; border-radius:12px; border:1px solid var(--border); background:#fff; font-size:12.5px; font-weight:800; cursor:pointer; }
    .statusBtn.small{ padding:6px 10px; border-radius:8px; font-size:12px; }
    .statusBtn.loan{ background: var(--loanBg); border-color: rgba(245,158,11,.35); color:#92400e; }
    .statusBtn.returned{ background: var(--returnedBg); border-color: rgba(22,163,74,.35); color:#065f46; }
    .statusBtn:disabled{ opacity:.55; cursor:not-allowed; }

    /* Modals */
    dialog{ border:none;border-radius:18px; width:min(720px,92vw); max-height: 92vh; box-shadow:var(--shadow); padding:0; background:#fff; overflow:hidden; display:flex; flex-direction:column; }
    dialog:not([open]){ display:none; }
    dialog::backdrop{background:rgba(2,6,23,.45)}
    .modalHead{ flex: 0 0 auto; padding:14px 16px;border-bottom:1px solid var(--border); background:#f8fafc; display:flex;justify-content:space-between;align-items:center;gap:12px; }
    .modalBody{ flex: 1 1 auto; overflow-y: auto; padding:14px 16px; display:grid; gap:10px;}
    .modalFoot{ flex: 0 0 auto; padding:14px 16px;border-top:1px solid var(--border); background:#fff; display:flex; gap:10px; justify-content:space-between;}
    .xbtn{ width:40px;height:40px;border-radius:12px; display:grid;place-items:center;background:#fff;border:1px solid var(--border) }
    .msg{font-size:13px} .msg.error{color:var(--danger)} .msg.ok{color:var(--ok)}

    /* Toast */
    #toast{ position:fixed; top:16px; right:16px; z-index:9999; max-width:min(520px, calc(100vw - 32px)); padding:12px 14px; border-radius:14px; border:1px solid var(--border); box-shadow:var(--shadow); background:#fff; color:#0f172a; font-size:13px; line-height:1.35; display:none; white-space:pre-wrap; }
    #toast.show{display:block; animation:toastIn .15s ease-out}
    #toast.ok{border-color:rgba(22,163,74,.25); background:#f0fdf4; color:#065f46}
    #toast.error{border-color:rgba(225,29,72,.25); background:#fff1f2; color:#9f1239}
    @keyframes toastIn{from{transform:translateY(-6px); opacity:0}to{transform:translateY(0); opacity:1}}
    
    /* Daily Modal */
    #dailyModal{ width: min(980px, 96vw); }
    .dailyRow{ border:1px solid var(--border); border-radius:16px; padding:16px; background:#fff; box-shadow: var(--shadow2); margin-bottom:10px;}
    .dailyTop{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
    .dailyItem{ font-weight:900; font-size:16px; color:#0f172a; }
    .dailyMeta{ margin-top:10px; font-size:14.5px; color:#334155; }
    .dailyNote{ padding:14px 16px; border:1px solid rgba(100,116,139,.35); border-radius:16px; background: rgba(241,245,249,.75); color:#334155; font-size:15px; font-weight:800; margin-bottom:14px;}
  </style>
</head>
<body>

<header>
  <div class="wrap">
    <div style="display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:center;">
      <h1>備品予約管理</h1>
      <div style="display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap;">
        <div style="min-width:160px;">
          <label style="margin:0 0 6px;">表示カテゴリ</label>
          <select id="categorySelect" style="font-weight:bold; color:var(--primary); border-color:var(--primary);">
            <option value="av">音響・ケーブル (日単位)</option>
            <option value="rearcar">リヤカー (時間単位)</option>
            <option value="pipespace">パイプスペース (時間単位)</option>
            <option value="deskspace">デスクスペース (時間単位)</option>
          </select>
        </div>
        <div style="min-width:140px;">
          <label style="margin:0 0 6px;">表示月</label>
          <input id="monthPicker" type="month" />
        </div>
      </div>
    </div>
    <div class="subrow">
      <span class="pill">
        色： <span class="badge reserved">予約</span> <span class="badge loan">貸出中</span> <span class="badge returned">返却済</span> <span class="badge overdue" style="margin-left:6px;">期限超過</span>
      </span>
      <span class="pill" id="limitPill">予約可能：—</span>
      <button id="itemsBtn">備品管理</button>
      <button id="notifBtn">返却通知ON</button>
      <button id="clearBtn" class="danger">全データ削除</button>
    </div>
    <div class="tabs" role="tablist">
      <button class="tabbtn active" data-tab="tabGrid">予約表</button>
      <button class="tabbtn" data-tab="tabList">一覧</button>
    </div>
  </div>
</header>

<main>
  <div class="wrap">
    <section class="statsGrid" aria-label="サマリー">
      <div class="statCard">
        <div><div class="statTitle">総備品数</div><div class="statValue" id="statTotal">—</div></div>
        <div class="iconWrap blue"><svg viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><path d="M3.3 7l8.7 5 8.7-5"></path><path d="M12 22V12"></path></svg></div>
      </div>
      <div class="statCard">
        <div><div class="statTitle">本日利用可能</div><div class="statValue" id="statAvailable">—</div></div>
        <div class="iconWrap green"><svg viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2"><path d="M20 6 9 17l-5-5"></path></svg></div>
      </div>
      <div class="statCard">
        <div><div class="statTitle">貸出中（本日）</div><div class="statValue" id="statLoan">—</div></div>
        <div class="iconWrap amber"><svg viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><circle cx="12" cy="12" r="9"></circle><path d="M12 7v6l4 2"></path></svg></div>
      </div>
      <div class="statCard">
        <div><div class="statTitle">期限超過</div><div class="statValue" id="statOverdue">—</div></div>
        <div class="iconWrap red"><svg viewBox="0 0 24 24" fill="none" stroke="#e11d48" stroke-width="2"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"></path><path d="M12 9v4"></path><path d="M12 17h.01"></path></svg></div>
      </div>
    </section>

    <section id="tabGrid" class="tabpane active">
      <div style="background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:14px; box-shadow:var(--shadow);">
        <div style="font-weight:800; font-size:16px;" id="gridTitle">日 × 備品</div>
        <div class="hint">セルをクリックすると予約の追加・編集ができます。<br>複数日（または複数時間）予約の伝票番号は開始セルに表示されます。</div>
        <div id="topScroll" class="topScroll" style="margin-top:12px;"><div id="topScrollInner"></div></div>
        <div id="gridScroll" class="tableWrap" style="margin-top:10px;">
          <table id="grid"></table>
        </div>
      </div>
    </section>

    <section id="tabList" class="tabpane">
      <div style="background:#fff; border:1px solid var(--border); border-radius:var(--radius); padding:14px; box-shadow:var(--shadow);">
        <div style="font-weight:800; font-size:16px;">予約一覧</div>
        <div style="margin-top:12px;">
          <label>検索（備品名 / 団体名 / 伝票）</label>
          <input id="searchInput" placeholder="例：マイク / IPC / A-12345" />
        </div>
        <div class="subrow" style="margin-top:12px;">
          <span class="pill" id="listSelPill">選択：0件</span>
          <button id="listSelectAllBtn">表示中を全選択</button>
          <button id="listClearSelBtn">選択解除</button>
          <button id="batchLoanBtn" class="statusBtn loan" disabled>選択を貸出</button>
          <button id="batchReturnBtn" class="statusBtn returned" disabled>選択を返却</button>
        </div>
        <div class="listTable" style="margin-top:12px; max-height:560px; overflow:auto;">
          <table>
            <thead>
              <tr>
                <th style="width:40px;">✓</th>
                <th>利用期間 / 時間</th>
                <th>場所 / 備品</th>
                <th>団体名</th>
                <th>伝票</th>
                <th>状態</th>
                <th>操作</th>
                <th>詳細</th>
              </tr>
            </thead>
            <tbody id="listBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </div>
</main>

<dialog id="modal">
  <div class="modalHead">
    <div>
      <div style="font-size:12px;color:var(--muted);">予約の詳細</div>
      <div id="modalTitle" style="font-size:15px;font-weight:850;">—</div>
    </div>
    <button class="xbtn" id="closeModalBtn">✕</button>
  </div>
  <div class="modalBody">
    <div><label>備品 / 場所</label><select id="modalItem"></select></div>

    <div id="multiContainer">
      <label style="display:flex; align-items:center; gap:10px; margin-bottom:0;">
        <input id="modalMulti" type="checkbox" style="width:auto;" /> 複数備品を同時に予約する
      </label>
      <div id="multiWrap" style="display:none; margin-top:10px; border:1px solid var(--border); border-radius:12px; padding:10px; background:#f8fafc;">
        <label>備品を検索（複数選択）</label>
        <input id="multiSearch" placeholder="例：ワイヤレス / 2号車" />
        <div class="hint">※同じカテゴリの備品のみ一括登録できます。</div>
        <div style="display:flex; gap:10px; margin-top:10px;">
          <button type="button" id="multiAllBtn">全選択</button>
          <button type="button" id="multiClearBtn">全解除（代表だけ残す）</button>
        </div>
        <div id="multiList" style="margin-top:10px; max-height:200px; overflow:auto; display:grid; gap:8px;"></div>
      </div>
    </div>

    <div><label>利用日 (開始)</label><input id="modalStart" type="date" /></div>
    
    <div id="dailyInputs">
      <label>利用日 (終了) ※最大7日</label>
      <input id="modalEnd" type="date" />
      <div class="hint" id="modalRangeHint">—</div>
    </div>

    <div id="hourlyInputs" style="display:none; gap:10px;">
      <div style="flex:1;"><label>開始時間 (9:00~21:00)</label><input id="modalStartTime" type="time" min="09:00" max="21:00" step="1800"/></div>
      <div style="flex:1;"><label>終了時間 (9:00~21:00)</label><input id="modalEndTime" type="time" min="09:00" max="21:00" step="1800"/></div>
    </div>

    <div><label>団体名</label><input id="modalGroup" placeholder="例：軽音楽研究会IPC" /></div>
    <div><label>状態</label><select id="modalStatus"><option value="reserved">予約（未貸出）</option><option value="loan">貸出中</option><option value="returned">返却済</option></select></div>
    <div><label>伝票番号（任意）</label><input id="modalSlip" placeholder="例：A-12345" /></div>
    <div id="modalMsg" class="msg"></div>
  </div>
  <div class="modalFoot">
    <button id="modalDelete" class="danger">削除</button>
    <div style="display:flex; gap:10px;">
      <button id="modalCancel">閉じる</button>
      <button id="modalSave" class="primary">保存</button>
    </div>
  </div>
</dialog>

<dialog id="itemsModal">
  <div class="modalHead">
    <div><div style="font-size:12px;color:var(--muted);">設定</div><div style="font-size:15px;font-weight:850;">備品管理</div></div>
    <button class="xbtn" id="closeItemsModal">✕</button>
  </div>
  <div class="modalBody">
    <div>
      <label>備品を追加</label>
      <div style="display:flex; gap:10px; align-items:center;">
        <input id="newItemName" placeholder="名称" style="flex:2;" />
        <select id="newItemCategory" style="flex:1;">
          <option value="av">音響(日)</option><option value="rearcar">ﾘﾔｶｰ(時)</option>
          <option value="pipespace">ﾊﾟｲﾌﾟ(時)</option><option value="deskspace">ﾃﾞｽｸ(時)</option>
        </select>
        <button id="addItemBtn">追加</button>
      </div>
    </div>
    <div>
      <label>備品一覧（名称変更）</label>
      <div style="border:1px solid var(--border); border-radius:12px; max-height:400px; overflow:auto;">
        <table style="width:100%;">
          <thead><tr><th style="background:#f1f5f9; position:sticky; top:0;">ID</th><th style="background:#f1f5f9; position:sticky; top:0;">名称</th><th style="background:#f1f5f9; position:sticky; top:0;"></th></tr></thead>
          <tbody id="itemsTbody"></tbody>
        </table>
      </div>
    </div>
    <div id="itemsMsg" class="msg"></div>
  </div>
  <div class="modalFoot"><button id="itemsClose2" style="margin-left:auto;">閉じる</button></div>
</dialog>

<dialog id="dailyModal">
  <div class="modalHead">
    <div><div style="font-size:12px;color:var(--muted);">リマインド</div><div id="dailyTitle">—</div></div>
  </div>
  <div class="modalBody"><div id="dailyBody" style="display:grid; gap:14px;"></div></div>
  <div class="modalFoot"><button id="dailyOkBtn" class="primary" style="margin-left:auto;">確認しました</button></div>
</dialog>

<dialog id="clearModal">
  <div class="modalHead">

function pad2(n){ return String(n).padStart(2,"0"); }
function ymd(date){ return `${date.getFullYear()}-${pad2(date.getMonth()+1)}-${pad2(date.getDate())}`; }
function fromYmd(s){ const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); }
function daysInMonth(y,m){ return new Date(y,m,0).getDate(); }
function weekdayJa(date){ return ["(日)","(月)","(火)","(水)","(木)","(金)","(土)"][date.getDay()]; }
function escapeHtml(s){ return String(s||"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function dayDiffInclusive(start, end){ return Math.floor((fromYmd(end).getTime()-fromYmd(start).getTime())/86400000)+1; }
function overlapsMonth(start, end, mStart, mEnd){ return !(end < mStart || start > mEnd); }

const ITEMS_KEY = "equip_items_v2";

  let arr = [];
  try { arr = JSON.parse(localStorage.getItem(ITEMS_KEY) || "[]"); } catch(e){}
  if(!arr.length) { arr = [...ITEMS_DEFAULT]; saveItems(arr); }
  return arr.sort((a,b)=>a.id-b.id);
}
function saveItems(arr){ localStorage.setItem(ITEMS_KEY, JSON.stringify(arr)); }
let ITEMS_DATA = loadItems();
function findItem(id){ return ITEMS_DATA.find(x=>x.id==id); }

const STORAGE_KEY = "equip_reservations_v4";

// V2(日単位) -> V4(統合) への自動マイグレーション
(function migrateV2toV4(){
  const oldData = localStorage.getItem("equip_reservations_tabs_v2");
  if(oldData && !localStorage.getItem(STORAGE_KEY)){
    const parsed = JSON.parse(oldData);
    const migrated = parsed.map(r => ({
      id: "mig_" + Math.random().toString(36).substr(2,9),
      itemId: r.itemId,
      date: r.date,
      startDate: r.startDate || r.date,
      endDate: r.endDate || r.date,
      startTime: "09:00",
      endTime: "21:00",
      group: r.group || "",
      slipNo: r.slipNo || "",
      status: r.status || "reserved",
      createdAt: r.createdAt || new Date().toISOString()
    }));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(migrated));
  }
})();

function loadReservations(){ return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); }
function saveReservations(arr){ localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }
function normalizeStatus(s){ return ["reserved","loan","returned"].includes(s) ? s : "reserved"; }
function statusLabel(s){ s=normalizeStatus(s); return s==="loan"?"貸出中":s==="returned"?"返却済":"予約"; }

const catSelect = document.getElementById("categorySelect");
const monthPicker = document.getElementById("monthPicker");
const grid = document.getElementById("grid");

function getSelectedMonth(){
  const v = monthPicker.value || ymd(new Date()).slice(0,7);
  const [y,m] = v.split("-").map(Number);
  return {year:y, month:m};
}

function renderAll(){
  const cat = catSelect.value;
  const isAv = (cat === "av");
  
  // 期限のテキスト更新
  const limitPill = document.getElementById("limitPill");
  if(isAv) limitPill.textContent = "予約可能：翌月末まで(1日単位)";
  else if(cat==="rearcar") limitPill.textContent = "予約可能：1ヶ月先月末まで(時間)";
  else limitPill.textContent = "予約可能：3ヶ月先月末まで(時間)";

  // 予約表のタイトル
  document.getElementById("gridTitle").textContent = isAv ? "日 × 備品" : "日付 × 時間";

  renderStats(cat);
  if(isAv) renderDailyGrid(); else renderHourlyGrid(cat);
  renderList();
  
  requestAnimationFrame(ensureDoubleScroll);
}

// 【日単位】予約表（横軸:日付、縦軸:備品）
function renderDailyGrid(){
  const {year, month} = getSelectedMonth();
  const dim = daysInMonth(year, month);
  const items = ITEMS_DATA.filter(i => i.category === "av");
  const resList = loadReservations();

  let thead = `<tr><th class="daily-sticky">備品</th>`;
  for(let d=1; d<=dim; d++){
    const dt = new Date(year, month-1, d);
    thead += `<th>${d}<br><span style="font-size:10px">${weekdayJa(dt)}</span></th>`;
  }
  thead += `</tr>`;

  let tbody = "";
  items.forEach(it => {
    tbody += `<tr><td class="daily-sticky">${it.name}</td>`;
    for(let d=1; d<=dim; d++){
      const dateStr = `${year}-${pad2(month)}-${pad2(d)}`;
      const res = resList.find(r => r.itemId == it.id && r.date === dateStr);
      
      if(res){
        const isStart = (res.startDate === dateStr || d===1);
        const overdue = (res.status==="loan" && res.endDate < ymd(new Date())) ? "overdue" : "";
        tbody += `<td class="cell ${res.status} ${overdue}" onclick="openModal('${res.id}')" title="${res.group}\n${res.startDate}~${res.endDate}">${isStart ? escapeHtml(res.slipNo||'済') : ''}</td>`;
      } else {
        tbody += `<td class="cell" onclick="openNewModal(${it.id}, '${dateStr}')"></td>`;
      }
    }
    tbody += `</tr>`;
  });

  grid.innerHTML = `<thead>${thead}</thead><tbody>${tbody}</tbody>`;
}

// 【時間単位】予約表（横軸:時間、縦軸:日付×場所）
function renderHourlyGrid(category){
  const {year, month} = getSelectedMonth();
  const dim = daysInMonth(year, month);
  const items = ITEMS_DATA.filter(i => i.category === category);
  const resList = loadReservations();

  let thead = `<tr><th class="hourly-sticky-date">日付</th><th class="hourly-sticky-item">場所/備品</th>`;
  for(let h=9; h<=21; h++) {
    // 21時以降の枠（例: 21:00〜22:00）が不要ならループは20までにする運用もあるが、台帳に合わせて21まで作成
    thead += `<th>${h}:00</th>`; 
  }
  thead += `</tr>`;

  let tbody = "";
  for(let d=1; d<=dim; d++){
    const dateStr = `${year}-${pad2(month)}-${pad2(d)}`;
    const dt = new Date(year, month-1, d);
    
    items.forEach((it, idx) => {
      // 色分けクラス判定
      let colorClass = "";
      if (it.name.includes("2号車")) colorClass = "bg-rear2";
      else if (it.name.includes("3号車")) colorClass = "bg-rear3";
      else if (it.name.includes("旧館1F") || it.name.includes("111")) colorClass = "bg-ps1f-old";
      else if (it.name.includes("新館1F") || it.name.includes("30")) colorClass = "bg-ps1f-new";
      else if (it.name.includes("新館2F") || it.name.includes("19")) colorClass = "bg-ps2f";
      else if (it.name.includes("デスクスペース")) colorClass = "bg-ds";

      tbody += `<tr class="${colorClass}">`;
      if(idx === 0) tbody += `<td class="hourly-sticky-date" rowspan="${items.length}">${d} ${weekdayJa(dt)}</td>`;
      tbody += `<td class="hourly-sticky-item">${it.name}</td>`;

      for(let h=9; h<=21; h++){
        const hourStr = `${pad2(h)}:00`;
        const nextHourStr = `${pad2(h+1)}:00`;
        
        // 該当時間にかぶる予約を検索 (開始時間が今の時間枠より前、終了時間が今の時間より後)
        const res = resList.find(r => r.itemId == it.id && r.date === dateStr && (r.startTime < nextHourStr && r.endTime > hourStr));

        if(res){
          const isStart = (res.startTime <= hourStr && res.startTime > `${pad2(h-1)}:00`);
          const overdue = (res.status==="loan" && dateStr <= ymd(new Date()) && res.endTime < pad2(new Date().getHours())+":00") ? "overdue" : "";
          tbody += `<td class="cell ${res.status} ${overdue}" onclick="openModal('${res.id}')" title="${res.group} (${res.startTime}~${res.endTime})">${isStart ? '済' : ''}</td>`;
        } else {
          tbody += `<td class="cell ${colorClass}" onclick="openNewModal(${it.id}, '${dateStr}', '${hourStr}')"></td>`;
        }
      }
      tbody += `</tr>`;
    });
  }
  grid.innerHTML = `<thead>${thead}</thead><tbody>${tbody}</tbody>`;
}

// サマリー計算
function renderStats(cat){
  const items = ITEMS_DATA.filter(i => cat==="av" || i.category===cat);
  const total = items.length;
  let used = 0, loan = 0, overdue = 0;
  const today = ymd(new Date());
  
  loadReservations().forEach(r => {
    if(!items.find(i=>i.id == r.itemId)) return;
    if(r.date === today || (r.startDate <= today && today <= r.endDate)){
      used++;
      if(r.status==="loan") loan++;
    }
  });

  document.getElementById("statTotal").textContent = total;
  document.getElementById("statAvailable").textContent = Math.max(0, total - used);
  document.getElementById("statLoan").textContent = loan;
  
  const { overdue: od } = countDueToday();
  document.getElementById("statOverdue").textContent = od;
}

// ダブルスクロール同期
let syncFlags = { top:false, bot:false };
function ensureDoubleScroll(){
  const t = document.getElementById("topScroll"), ti = document.getElementById("topScrollInner"), b = document.getElementById("gridScroll");
  ti.style.width = b.scrollWidth + "px";
  t.onscroll = () => { if(!syncFlags.top){ syncFlags.bot=true; b.scrollLeft = t.scrollLeft; } syncFlags.top=false; };
  b.onscroll = () => { if(!syncFlags.bot){ syncFlags.top=true; t.scrollLeft = b.scrollLeft; } syncFlags.bot=false; };
}

/* =========================================================
   4) 一覧タブとバッチ処理
========================================================= */
const listBody = document.getElementById("listBody");
const searchInput = document.getElementById("searchInput");
let listRowPayload = new Map();

function renderList(){
  const {year, month} = getSelectedMonth();
  const mStart = `${year}-${pad2(month)}-01`, mEnd = `${year}-${pad2(month)}-${pad2(daysInMonth(year, month))}`;
  const q = searchInput.value.trim().toLowerCase();
  
  // 重複排除（同じグループの連日予約は1つにまとめる）
  const uniq = new Map();
  loadReservations().forEach(r => {
    // 検索・月フィルタ
    if(!overlapsMonth(r.startDate, r.endDate, mStart, mEnd)) return;
    const it = findItem(r.itemId);
    const iname = (it?it.name:"").toLowerCase();
    if(q && !iname.includes(q) && !(r.group||"").toLowerCase().includes(q) && !(r.slipNo||"").toLowerCase().includes(q)) return;

    // キー作成（AVは期間、時間単位は日時でまとめる）
    const key = it && it.category==="av" ? `${r.itemId}_${r.startDate}_${r.endDate}` : `${r.itemId}_${r.date}_${r.startTime}_${r.endTime}`;
    if(!uniq.has(key)) uniq.set(key, {...r, ids: [r.id]});
    else uniq.get(key).ids.push(r.id);
  });

  listBody.innerHTML = "";
  listRowPayload.clear();

  Array.from(uniq.values()).sort((a,b)=>a.startDate.localeCompare(b.startDate) || a.itemId-b.itemId).forEach(r => {
    const it = findItem(r.itemId);
    const tr = document.createElement("tr");
    
    // 期間文字列
    let timeStr = "";
    if(it && it.category === "av") timeStr = r.startDate===r.endDate ? r.startDate : `${r.startDate} ~ ${r.endDate}`;
    else timeStr = `${r.date} ${r.startTime}~${r.endTime}`;

    const cb = document.createElement("input"); cb.type="checkbox";
    cb.onchange = () => { if(cb.checked) listSelectedKeys.add(r.id); else listSelectedKeys.delete(r.id); updateListUI(); };
    cb.checked = listSelectedKeys.has(r.id);
    listRowPayload.set(r.id, r.ids); // この行に含まれる全IDを保存

    tr.innerHTML = `
      <td></td>
      <td>${timeStr}</td>
      <td>${it?it.name:"不明"}</td>
      <td>${escapeHtml(r.group)}</td>
      <td>${escapeHtml(r.slipNo)}</td>
      <td><span class="badge ${r.status}">${statusLabel(r.status)}</span></td>
      <td>
        <button class="statusBtn loan small" ${r.status==="loan"?"disabled":""} onclick="applyStatus(['${r.ids.join("','")}'], 'loan')">貸出</button>
        <button class="statusBtn returned small" ${r.status==="returned"?"disabled":""} onclick="applyStatus(['${r.ids.join("','")}'], 'returned')">返却</button>
      </td>
      <td><button class="statusBtn small" onclick="openModal('${r.ids[0]}')">詳細</button></td>
    `;
    tr.cells[0].appendChild(cb);
    listBody.appendChild(tr);
  });
  updateListUI();
}

function applyStatus(ids, status){
  let list = loadReservations();
  list.forEach(r => { if(ids.includes(r.id)) r.status = status; });
  saveReservations(list);
  renderAll();
  showToast(`状態を「${statusLabel(status)}」に変更しました`, "ok");
}

document.getElementById("batchLoanBtn").onclick = () => {
  let ids = []; listSelectedKeys.forEach(k => ids.push(...listRowPayload.get(k)));
  if(confirm(`${ids.length}セルの状態を貸出中にしますか？`)) applyStatus(ids, "loan");
};
document.getElementById("batchReturnBtn").onclick = () => {
  let ids = []; listSelectedKeys.forEach(k => ids.push(...listRowPayload.get(k)));
  if(confirm(`${ids.length}セルの状態を返却済にしますか？`)) applyStatus(ids, "returned");
};

document.getElementById("listSelectAllBtn").onclick = () => { listRowPayload.forEach((v,k)=>listSelectedKeys.add(k)); renderList(); };
document.getElementById("listClearSelBtn").onclick = () => { listSelectedKeys.clear(); renderList(); };
searchInput.oninput = renderList;

   5) モーダル (予約追加・編集・一括)
========================================================= */
const modal = document.getElementById("modal");
let editingIds = [];
let modalSelectedItemIds = new Set();

function openNewModal(itemId, dateStr, hourStr = "09:00"){
  editingIds = [];
  document.getElementById("modalMsg").textContent = "";
  populateModalSelects();
  
  const it = findItem(itemId);
  document.getElementById("modalTitle").textContent = `${dateStr} の新規予約`;
  document.getElementById("modalItem").value = itemId;
  document.getElementById("modalStart").value = dateStr;
  document.getElementById("modalEnd").value = dateStr;
  document.getElementById("modalStartTime").value = hourStr;
  document.getElementById("modalEndTime").value = pad2(parseInt(hourStr)+1)+":00";
  document.getElementById("modalGroup").value = "";
  document.getElementById("modalSlip").value = "";
  document.getElementById("modalStatus").value = "reserved";
  
  toggleModalInputs(it.category);
  document.getElementById("modalDelete").style.display = "none";
  document.getElementById("modalMulti").checked = false;
  document.getElementById("multiWrap").style.display = "none";
  modalSelectedItemIds = new Set([itemId]);
  
  modal.showModal();
}

function openModal(id){
  const res = loadReservations().find(r => r.id === id);
  if(!res) return;
  // 連日予約の場合、同じグループ・期間のものをまとめて編集対象にする
  editingIds = loadReservations().filter(r => r.itemId==res.itemId && r.startDate==res.startDate && r.endDate==res.endDate && r.group==res.group).map(r=>r.id);
  
  document.getElementById("modalMsg").textContent = "";
  populateModalSelects();
  
  const it = findItem(res.itemId);
  document.getElementById("modalTitle").textContent = `予約編集`;
  document.getElementById("modalItem").value = res.itemId;
  document.getElementById("modalStart").value = res.startDate;
  document.getElementById("modalEnd").value = res.endDate;
  document.getElementById("modalStartTime").value = res.startTime;
  document.getElementById("modalEndTime").value = res.endTime;
  document.getElementById("modalGroup").value = res.group;
  document.getElementById("modalSlip").value = res.slipNo;
  document.getElementById("modalStatus").value = res.status;
  
  toggleModalInputs(it.category);
  document.getElementById("modalDelete").style.display = "block";
  document.getElementById("multiContainer").style.display = "none"; // 編集時は複数選択隠す
  
  modal.showModal();
}

function toggleModalInputs(cat){
  const isAv = (cat === "av");
  document.getElementById("dailyInputs").style.display = isAv ? "block" : "none";
  document.getElementById("hourlyInputs").style.display = isAv ? "none" : "flex";
  document.getElementById("multiContainer").style.display = "block";
}

function populateModalSelects(){
  const sel = document.getElementById("modalItem");
  sel.innerHTML = "";
  ITEMS_DATA.forEach(it => { sel.innerHTML += `<option value="${it.id}">${it.name}</option>`; });
}

// 複数選択機能
document.getElementById("modalMulti").onchange = (e) => {
  document.getElementById("multiWrap").style.display = e.target.checked ? "block" : "none";
  renderMultiList();
};
function renderMultiList(){
  const listEl = document.getElementById("multiList");
  const q = document.getElementById("multiSearch").value.trim().toLowerCase();
  const baseItem = findItem(document.getElementById("modalItem").value);
  listEl.innerHTML = "";
  ITEMS_DATA.filter(it => it.category === baseItem.category && (it.name.toLowerCase().includes(q))).forEach(it => {
    const lbl = document.createElement("label"); lbl.style.cssText = "display:flex; gap:10px; background:#fff; padding:8px; border-radius:8px; border:1px solid var(--border);";
    const cb = document.createElement("input"); cb.type="checkbox"; cb.style.width="auto"; cb.checked = modalSelectedItemIds.has(it.id);
    cb.onchange = () => { if(cb.checked) modalSelectedItemIds.add(it.id); else modalSelectedItemIds.delete(it.id); };
    lbl.append(cb, it.name); listEl.appendChild(lbl);
  });
}
document.getElementById("multiSearch").oninput = renderMultiList;
document.getElementById("multiAllBtn").onclick = () => { ITEMS_DATA.filter(i=>i.category===findItem(document.getElementById("modalItem").value).category).forEach(i=>modalSelectedItemIds.add(i.id)); renderMultiList(); };
document.getElementById("multiClearBtn").onclick = () => { modalSelectedItemIds.clear(); modalSelectedItemIds.add(Number(document.getElementById("modalItem").value)); renderMultiList(); };
document.getElementById("modalItem").onchange = (e) => { toggleModalInputs(findItem(e.target.value).category); modalSelectedItemIds.add(Number(e.target.value)); renderMultiList(); };


// 保存処理
document.getElementById("modalSave").onclick = () => {
  const msg = document.getElementById("modalMsg");
  const baseItem = findItem(document.getElementById("modalItem").value);
  const start = document.getElementById("modalStart").value;
  const end = baseItem.category==="av" ? document.getElementById("modalEnd").value : start;
  const st = baseItem.category==="av" ? "09:00" : document.getElementById("modalStartTime").value;
  const et = baseItem.category==="av" ? "21:00" : document.getElementById("modalEndTime").value;
  const group = document.getElementById("modalGroup").value.trim();
  const slipNo = document.getElementById("modalSlip").value.trim();
  const status = document.getElementById("modalStatus").value;
  
  if(!group) return msg.textContent = "団体名を入れてください";
  if(baseItem.category!=="av" && (st>=et)) return msg.textContent = "正しい時間を入力してください";
  if(dayDiffInclusive(start, end) > 7) return msg.textContent = "最大7日までです";

  let list = loadReservations();
  if(editingIds.length) list = list.filter(r => !editingIds.includes(r.id)); // 編集時は既存を抜く

  const targetIds = document.getElementById("modalMulti").checked ? Array.from(modalSelectedItemIds) : [baseItem.id];
  let conflict = false;

  targetIds.forEach(id => {
    // 日付ループ (日単位なら複数日、時間単位なら1日のみ)
    let cur = fromYmd(start), endD = fromYmd(end);
    while(cur.getTime() <= endD.getTime()){
      const d = ymd(cur);
      // 重複チェック
      if(list.find(r => r.itemId==id && r.date===d && r.startTime<et && r.endTime>st)) conflict = true;
      cur.setDate(cur.getDate()+1);
    }
  });

  if(conflict) return msg.textContent = "すでに他の予約と被っています";

  // 保存実行
  const now = new Date().toISOString();
  targetIds.forEach(id => {
    let cur = fromYmd(start), endD = fromYmd(end);
    while(cur.getTime() <= endD.getTime()){
      list.push({ id: "res_"+Math.random().toString(36).substr(2,9), itemId: id, date: ymd(cur), startDate: start, endDate: end, startTime: st, endTime: et, group, slipNo, status, createdAt: now });
      cur.setDate(cur.getDate()+1);
    }
  });

  saveReservations(list);
  modal.close();
  renderAll();
  showToast("保存しました", "ok");
};

document.getElementById("modalDelete").onclick = () => {
  if(!confirm("本当に削除しますか？")) return;
  let list = loadReservations().filter(r => !editingIds.includes(r.id));
  saveReservations(list);
  modal.close(); renderAll(); showToast("削除しました", "ok");
};

document.getElementById("modalCancel").onclick = () => modal.close();
document.getElementById("closeModalBtn").onclick = () => modal.close();

/* =========================================================
   6) 備品管理モーダル
========================================================= */
const itemsModal = document.getElementById("itemsModal");
document.getElementById("itemsBtn").onclick = () => { renderItemsTable(); itemsModal.showModal(); };
document.getElementById("closeItemsModal").onclick = () => itemsModal.close();
document.getElementById("itemsClose2").onclick = () => itemsModal.close();

function renderItemsTable(){
  const tbody = document.getElementById("itemsTbody"); tbody.innerHTML = "";
  ITEMS_DATA.forEach(it => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>#${it.id}</td><td><input type="text" value="${it.name}" id="iname_${it.id}" style="padding:4px;"></td><td><button onclick="updateItemName(${it.id})">保存</button></td>`;
    tbody.appendChild(tr);
  });
}
function updateItemName(id){
  const nm = document.getElementById("iname_"+id).value.trim();
  if(!nm) return alert("空欄は不可です");
  ITEMS_DATA.find(i=>i.id==id).name = nm; saveItems(ITEMS_DATA);
  renderAll(); showToast("名称を更新しました", "ok");
}
document.getElementById("addItemBtn").onclick = () => {
  const nm = document.getElementById("newItemName").value.trim();
  const cat = document.getElementById("newItemCategory").value;
  if(!nm) return;
  const newId = Math.max(...ITEMS_DATA.map(i=>i.id)) + 1;
  ITEMS_DATA.push({ id: newId, name: nm, type: cat==="av"?"daily":"hourly", category: cat });
  saveItems(ITEMS_DATA);
  document.getElementById("newItemName").value = "";
  renderItemsTable(); renderAll(); showToast("備品を追加しました", "ok");
};

/* =========================================================
   7) 全データ削除モーダル
========================================================= */
const clearModal = document.getElementById("clearModal");
document.getElementById("clearBtn").onclick = () => { document.getElementById("clearMonth").value=ymd(new Date()).slice(0,7); clearModal.showModal(); };
document.getElementById("closeClearModal").onclick = () => clearModal.close();
document.getElementById("clearCancelBtn").onclick = () => clearModal.close();

document.getElementById("clearAllBtn").onclick = () => {
  if(confirm("本当に全データを削除しますか？(復旧不可)")){
    saveReservations([]); renderAll(); clearModal.close(); showToast("全データを削除しました", "ok");
  }
};
document.getElementById("clearDoBtn").onclick = () => {
  const m = document.getElementById("clearMonth").value;
  if(!m) return;
  const cutoff = m + "-31"; // 簡易判定
  if(!confirm(`${m} までのデータを削除しますか？`)) return;
  const next = loadReservations().filter(r => r.endDate > cutoff || r.date > cutoff);
  saveReservations(next); renderAll(); clearModal.close(); showToast("期限までのデータを削除しました", "ok");
};

/* =========================================================
   8) 通知・初期化
========================================================= */
function countDueToday(){
  const today = ymd(new Date());
  let due = 0, overdue = 0;
  loadReservations().forEach(r => {
    if(r.status==="loan" && r.endDate === today) due++;
    if(r.status==="loan" && r.endDate < today) overdue++;
  });
  return {due, overdue};
}

function showTomorrowPopup(){
  const tomorrow = ymd(new Date(Date.now() + 86400000));
  const list = loadReservations().filter(r => r.date === tomorrow);
  document.getElementById("dailyTitle").textContent = `明日(${tomorrow})の予約`;
  const body = document.getElementById("dailyBody");
  if(!list.length) body.innerHTML = `<div class="dailyNote">明日の予約はありません。</div>`;
  else {
    body.innerHTML = `<div class="dailyNote">未返却はありませんか？明日の予約は以下の通りです。</div>`;
    list.forEach(r => {
      const it = findItem(r.itemId);
      body.innerHTML += `<div class="dailyRow"><div class="dailyTop"><div class="dailyItem">${it?it.name:""}</div><span class="badge ${r.status}">${statusLabel(r.status)}</span></div><div class="dailyMeta">団体: ${escapeHtml(r.group)}<br>時間: ${r.startTime}~${r.endTime}</div></div>`;
    });
  }
  document.getElementById("dailyModal").showModal();
}
document.getElementById("dailyOkBtn").onclick = () => document.getElementById("dailyModal").close();

// Initialize
(function init(){
  document.querySelectorAll(".tabbtn").forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll(".tabbtn").forEach(b=>b.classList.remove("active"));
      document.querySelectorAll(".tabpane").forEach(p=>p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById(btn.dataset.tab).classList.add("active");
      if(btn.dataset.tab === "tabGrid") ensureDoubleScroll();
    };
  });
  
  monthPicker.value = ymd(new Date()).slice(0,7);
  monthPicker.onchange = renderAll;
  catSelect.onchange = renderAll;
  
  renderAll();
})();
</script>
