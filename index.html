<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>備品予約管理</title>
  <style>
    :root{
      --page:#f6f7fb; --card:#ffffff; --card2:#fbfcff; --border:#e6e9f2; --border2:#dbe1ee;
      --text:#0f172a; --muted:#64748b; --shadow:0 14px 38px rgba(15,23,42,.08); --shadow2:0 8px 20px rgba(15,23,42,.06); --radius:16px;
      --primary:#2563eb; --primary2:#7c3aed; --danger:#e11d48; --ok:#16a34a; --warn:#f59e0b; --cyan:#06b6d4;
      --reservedBg:#d1d5dba6; --loanBg:#feecd6; --returnedBg:#abffd9; --overdue:#ef4444; --hover:#eef2ff;
    }
    *{box-sizing:border-box} html,body{height:100%}
    body{ margin:0; font-family:system-ui,-apple-system,sans-serif; background:var(--page); color:var(--text); overflow-x:hidden;}
    header{ position:sticky;top:0;z-index:20; background:rgba(255,255,255,.9); backdrop-filter: blur(12px); border-bottom:1px solid var(--border); padding:12px 16px; }
    .wrap{ max-width:1200px; margin:0 auto; }
    h1{ margin:0; font-size:18px; display:flex; align-items:center; gap:10px; }
    label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
    input,select,button{ width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px; outline:none; }
    button{ cursor:pointer; background:#fff; width:auto;}
    button.primary{ background:var(--primary); color:#fff; border:none; }
    button.danger{ color:var(--danger); border-color:var(--danger); }
    .badge{ display:inline-block; padding:3px 8px; border-radius:999px; font-size:11px; border:1px solid var(--border); }
    .badge.reserved{background:var(--reservedBg)} .badge.loan{background:var(--loanBg)} .badge.returned{background:var(--returnedBg)}
    
    /* Grid */
    .tableWrap{ overflow:auto; border:1px solid var(--border); background:#fff; max-height: 60vh;}
    table{ border-collapse:collapse; width:100%; font-size:12px; text-align:center;}
    th,td{ border:1px solid var(--border); padding:6px; min-width:40px; white-space:nowrap; }
    th{ background:#f8fafc; position:sticky; top:0; z-index:10; }
    td.cell{ cursor:pointer; }
    td.cell:hover{ background:var(--hover); }
    td.cell.reserved{background:var(--reservedBg)} td.cell.loan{background:var(--loanBg)} td.cell.returned{background:var(--returnedBg)}
    
    /* Hourly Grid Specific */
    .hourly-date-cell { font-weight:bold; background:#f8fafc; vertical-align:middle; position:sticky; left:0; z-index:5; }
    .item-cell { position:sticky; left:50px; background:#fff; z-index:5; text-align:left;}

    /* Modal */
    dialog{ border:none; border-radius:12px; padding:20px; width:90%; max-width:500px; box-shadow:var(--shadow); }
    dialog::backdrop{background:rgba(0,0,0,.5)}
    .modal-grid { display:grid; gap:12px; margin-top:10px;}
    .flex-row { display:flex; gap:10px; }
    .msg{ font-size:12px; margin-top:5px; color:var(--danger);}
  </style>
</head>
<body>

<header>
  <div class="wrap" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
    <h1>備品予約管理</h1>
    <div style="display:flex; gap:10px; align-items:center;">
      <select id="categorySelect" style="font-weight:bold; border-color:var(--primary); color:var(--primary);">
        <option value="av">音響・ケーブル (日単位)</option>
        <option value="rearcar">リヤカー (時間単位)</option>
        <option value="pipespace">パイプスペース (時間単位)</option>
        <option value="deskspace">デスクスペース (時間単位)</option>
      </select>
      <input id="monthPicker" type="month" style="width:auto;" />
    </div>
  </div>
  <div class="wrap" style="margin-top:10px; font-size:13px; color:var(--muted);" id="limitText">
    ※予約期限：翌月末まで
  </div>
</header>

<main class="wrap" style="padding:20px 0;">
  <div class="tableWrap">
    <table id="grid"></table>
  </div>
</main>

<dialog id="modal">
  <div style="font-weight:bold; font-size:16px; margin-bottom:10px;" id="modalTitle">予約詳細</div>
  <div class="modal-grid">
    <div><label>備品/場所</label><select id="modalItem" disabled></select></div>
    
    <div class="flex-row">
      <div style="flex:1;"><label>利用日</label><input id="modalDate" type="date" /></div>
    </div>

    <div id="hourlyInputs" class="flex-row" style="display:none;">
      <div style="flex:1;"><label>開始時間</label><input id="modalStartTime" type="time" min="09:00" max="21:00" step="1800"/></div>
      <div style="flex:1;"><label>終了時間</label><input id="modalEndTime" type="time" min="09:00" max="21:00" step="1800"/></div>
    </div>

    <div><label>団体名</label><input id="modalGroup" placeholder="例：軽音楽研究会IPC" /></div>
    <div>
      <label>状態</label>
      <select id="modalStatus">
        <option value="reserved">予約（未貸出）</option>
        <option value="loan">貸出中</option>
        <option value="returned">返却済</option>
      </select>
    </div>
    <div><label>伝票番号</label><input id="modalSlip" placeholder="例：A-12345" /></div>
    <div id="modalMsg" class="msg"></div>
  </div>
  <div class="flex-row" style="margin-top:20px;">
    <button id="btnDelete" class="danger">削除</button>
    <button id="btnCancel" style="margin-left:auto;">閉じる</button>
    <button id="btnSave" class="primary">保存</button>
  </div>
</dialog>

<script>
/* =========================================================

========================================================= */

  { id: 101, name: "2号車", type: "hourly", category: "rearcar" },
  { id: 102, name: "3号車", type: "hourly", category: "rearcar" },

  // --- パイプスペース（時間単位） ---
  { id: 201, name: "旧館1F(111)", type: "hourly", category: "pipespace" },
  { id: 202, name: "新館1F(30)", type: "hourly", category: "pipespace" },
  { id: 203, name: "新館2F(19)", type: "hourly", category: "pipespace" },

  // --- デスクスペース（時間単位） ---
  { id: 301, name: "デスクスペース(4つ)", type: "hourly", category: "deskspace" }

/* データ構造が変わるため、保存キーをv3に変更（以前のデータと混ざってエラーになるのを防ぐため） */
const STORAGE_KEY = "equip_reservations_v3";

function loadReservations(){
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
}
function saveReservations(arr){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
}

// ユーティリティ
function pad2(n){ return String(n).padStart(2,"0"); }
function ymd(date){ return `${date.getFullYear()}-${pad2(date.getMonth()+1)}-${pad2(date.getDate())}`; }
function daysInMonth(y,m){ return new Date(y,m,0).getDate(); }
function getSelectedMonth(){
  const [y,m] = document.getElementById("monthPicker").value.split("-").map(Number);
  return {year:y, month:m};
}

/* =========================================================
   2) カレンダー描画ロジック（日単位 ＆ 時間単位）
========================================================= */
function renderAll(){
  const cat = document.getElementById("categorySelect").value;
  updateLimitText(cat);
  
  if(cat === "av") {
    renderDailyGrid();
  } else {
    renderHourlyGrid(cat);
  }
}

function updateLimitText(cat) {
  const textEl = document.getElementById("limitText");
  if(cat === "av") textEl.textContent = "※予約期限：翌月末まで（1日単位）";
  else if(cat === "rearcar") textEl.textContent = "※予約期限：1ヶ月先の月末まで（9:00〜21:00）";
  else textEl.textContent = "※予約期限：3ヶ月先の月末まで（9:00〜21:00）";
}

// 【従来型】日単位カレンダー（横軸：日付、縦軸：備品）
function renderDailyGrid(){
  const {year, month} = getSelectedMonth();
  const dim = daysInMonth(year, month);
  const items = ITEMS_DEFAULT.filter(i => i.category === "av");
  const resList = loadReservations();

  let thead = `<tr><th>備品</th>`;
  for(let d=1; d<=dim; d++) thead += `<th>${d}</th>`;
  thead += `</tr>`;

  let tbody = "";
  items.forEach(it => {
    tbody += `<tr><td class="item-cell">${it.name}</td>`;
    for(let d=1; d<=dim; d++){
      const dateStr = `${year}-${pad2(month)}-${pad2(d)}`;
      const res = resList.find(r => r.itemId == it.id && r.date === dateStr);
      
      if(res){
        tbody += `<td class="cell ${res.status}" onclick="openModal(${it.id}, '${dateStr}')" title="${res.group}">${res.slipNo || '済'}</td>`;
      } else {
        tbody += `<td class="cell" onclick="openModal(${it.id}, '${dateStr}')"></td>`;
      }
    }
    tbody += `</tr>`;
  });

  document.getElementById("grid").innerHTML = `<thead>${thead}</thead><tbody>${tbody}</tbody>`;
}

// 【新型】時間単位カレンダー（横軸：時間、縦軸：日付と備品）
function renderHourlyGrid(category){
  const {year, month} = getSelectedMonth();
  const dim = daysInMonth(year, month);
  const items = ITEMS_DEFAULT.filter(i => i.category === category);
  const resList = loadReservations();

  // ヘッダー（9時〜21時）
  let thead = `<tr><th style="min-width:40px; left:0; z-index:20;">日</th><th style="min-width:100px; left:40px; z-index:20;">場所/備品</th>`;
  for(let h=9; h<=21; h++) thead += `<th>${h}:00</th>`;
  thead += `</tr>`;

  let tbody = "";
  for(let d=1; d<=dim; d++){
    const dateStr = `${year}-${pad2(month)}-${pad2(d)}`;
    
    items.forEach((it, idx) => {
      tbody += `<tr>`;
      if(idx === 0) {
        tbody += `<td class="hourly-date-cell" rowspan="${items.length}">${d}</td>`;
      }
      tbody += `<td class="item-cell">${it.name}</td>`;

      for(let h=9; h<=21; h++){
        const hourStr = `${pad2(h)}:00`;
        // その時間帯にかぶっている予約を探す
        const res = resList.find(r => {
          if(r.itemId != it.id || r.date !== dateStr) return false;
          return r.startTime <= hourStr && hourStr < r.endTime; // 9:00〜10:00なら、9:00のセルに表示
        });

        if(res){
          tbody += `<td class="cell ${res.status}" onclick="openModal(${it.id}, '${dateStr}', '${res.id}')" title="${res.group} (${res.startTime}~${res.endTime})">済</td>`;
        } else {
          tbody += `<td class="cell" onclick="openModal(${it.id}, '${dateStr}', null, '${hourStr}')"></td>`;
        }
      }
      tbody += `</tr>`;
    });
  }

  document.getElementById("grid").innerHTML = `<thead>${thead}</thead><tbody>${tbody}</tbody>`;
}

/* =========================================================
   3) モーダル操作とデータ保存
========================================================= */
const modal = document.getElementById("modal");
let currentEditingId = null; // 既存予約の編集用ID

// 備品プルダウン生成
const modalItem = document.getElementById("modalItem");
ITEMS_DEFAULT.forEach(it => {
  modalItem.innerHTML += `<option value="${it.id}">${it.name}</option>`;
});

function openModal(itemId, dateStr, existingResId = null, clickedHour = null){
  document.getElementById("modalMsg").textContent = "";
  const category = document.getElementById("categorySelect").value;
  
  modalItem.value = itemId;
  document.getElementById("modalDate").value = dateStr;
  
  // 時間単位かどうかのUI切替
  const isHourly = (category !== "av");
  document.getElementById("hourlyInputs").style.display = isHourly ? "flex" : "none";

  if(existingResId){
    // 既存予約の編集
    const res = loadReservations().find(r => r.id === existingResId || (r.itemId == itemId && r.date === dateStr));
    currentEditingId = res.id;
    document.getElementById("modalGroup").value = res.group;
    document.getElementById("modalSlip").value = res.slipNo;
    document.getElementById("modalStatus").value = res.status;
    if(isHourly){
      document.getElementById("modalStartTime").value = res.startTime;
      document.getElementById("modalEndTime").value = res.endTime;
    }
    document.getElementById("btnDelete").style.display = "block";
  } else {
    // 新規
    currentEditingId = Date.now().toString(); // 新規ID発行
    document.getElementById("modalGroup").value = "";
    document.getElementById("modalSlip").value = "";
    document.getElementById("modalStatus").value = "reserved";
    if(isHourly && clickedHour){
      document.getElementById("modalStartTime").value = clickedHour;
      // 終了時間はとりあえず1時間後にセット
      let endH = parseInt(clickedHour.split(":")[0]) + 1;
      document.getElementById("modalEndTime").value = `${pad2(endH)}:00`;
    }
    document.getElementById("btnDelete").style.display = "none";
  }

  modal.showModal();
}

document.getElementById("btnCancel").onclick = () => modal.close();

// 保存処理
document.getElementById("btnSave").onclick = () => {
  const itemId = document.getElementById("modalItem").value;
  const dateStr = document.getElementById("modalDate").value;
  const group = document.getElementById("modalGroup").value;
  const slipNo = document.getElementById("modalSlip").value;
  const status = document.getElementById("modalStatus").value;
  const category = document.getElementById("categorySelect").value;
  
  let startTime = null, endTime = null;
  
  if(!group || !slipNo) {
    document.getElementById("modalMsg").textContent = "団体名と伝票番号は必須です";
    return;
  }

  if(category !== "av") {
    startTime = document.getElementById("modalStartTime").value;
    endTime = document.getElementById("modalEndTime").value;
    if(!startTime || !endTime || startTime >= endTime) {
      document.getElementById("modalMsg").textContent = "正しい時間を入力してください";
      return;
    }
  }

  let list = loadReservations();
  
  // 編集中のデータはいったん除外
  list = list.filter(r => r.id !== currentEditingId);

  // （簡易的な重複チェック：時間単位の場合は同じ日の同じ備品で時間が被ってないか）
  // ※ここでは省略していますが、本格運用の際は追加をおすすめします

  // 保存
  list.push({
    id: currentEditingId,
    itemId: itemId,
    date: dateStr,
    startTime: startTime,
    endTime: endTime,
    group: group,
    slipNo: slipNo,
    status: status
  });

  saveReservations(list);
  modal.close();
  renderAll();
};

// 削除処理
document.getElementById("btnDelete").onclick = () => {
  if(!confirm("削除しますか？")) return;
  let list = loadReservations();
  list = list.filter(r => r.id !== currentEditingId);
  saveReservations(list);
  modal.close();
  renderAll();
}

// 初期化
document.getElementById("monthPicker").value = ymd(new Date()).slice(0,7);
document.getElementById("monthPicker").addEventListener("change", renderAll);
document.getElementById("categorySelect").addEventListener("change", renderAll);
renderAll();

</script>
</body>
</html>
